<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATDMstitch - Project Hub</title>
    <style>
        :root {
            --gold: #C5832B;
            --dark-gold: #a66e24;
            --glass: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background: radial-gradient(circle at center, var(--dark-gold) 0%, #000000 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
        }

        /* Kontener na całe menu */
        .dashboard {
            width: 90%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            font-weight: 200;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: var(--gold);
        }

        .subtitle {
            font-size: 0.8rem;
            opacity: 0.6;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Lista projektów */
        .project-list {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Odstęp między przyciskami */
        }

        /* Styl pojedynczego przycisku projektu */
        .project-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 25px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid transparent;
            border-radius: 15px;
            color: white;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .project-card:hover {
            border-color: var(--gold);
            background: rgba(197, 131, 43, 0.1);
            transform: translateX(10px);
        }

        .project-name {
            font-size: 1.1rem;
            font-weight: 400;
        }

        /* Mała strzałka po prawej stronie */
        .project-card::after {
            content: '→';
            font-size: 1.2rem;
            color: var(--gold);
            opacity: 0;
            transition: 0.3s;
        }

        .project-card:hover::after {
            opacity: 1;
        }

        /* Stopka */
        .footer {
            margin-top: 40px;
            font-size: 0.7rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>ATDMstitch</h1>
        <div class="subtitle">Interaktywne Projekty Logo</div>

        <nav class="project-list">
            
            <!-- TUTAJ DODAJESZ NOWE PROJEKTY - KOPIUJ LINJKĘ PONIŻEJ -->
            <a href="z1.html" class="project-card">
                <span class="project-name">Dzięcioł Złoty (V1)</span>
            </a>

            <a href="cz2.html" class="project-card">
                <span class="project-name">Dzięcioł Noir (V2)</span>
            </a>

            <a href="test.html" class="project-card">
                <span class="project-name">Laboratorium Ruchu</span>
            </a>

            <a href="ATDM.html" class="project-card">
                <span class="project-name">STARA STRONA</span>
            </a>

            <a href="ATDMstitch.html" class="project-card">
                <span class="project-name">STRONA ze stitch</span>
            </a>
            
            <a href="belka.html" class="project-card">
                <span class="project-name">belka z dzieciolem :)</span>
            </a>


            
            <!-- KONIEC MIEJSCA NA NOWE PROJEKTY -->

        </nav>

        <div class="footer">
            &copy; 2026 Creative Lab. Wszystkie interakcje aktywne.
        </div>
    </div>

</body>
</html>
